services:
  tgqq-forwarder:
    build: .
    image: tgqq-forwarder-dev
    container_name: tgqq-forwarder
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - ./data:/app/data
    ports:
      - "${MINI_APP_PORT:-8000}:${MINI_APP_PORT:-8000}"
    command:
      - python
      - -m
      - app.main
